<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Exposition Élégance | Astou Konaté</title>
    <link rel="stylesheet" href="meulfeu.css">
    <link href="https://googleapis.com" rel="stylesheet">
</head>
<body>

    <header>
        <nav>
            <div class="logo">ASTOU<span>GALLERY</span></div>
            <div class="menu-icon"><span></span></div>
        </nav>
    </header>

    <main>
        <section class="intro">
            <h1 class="reveal-text">L'Art de la <span>Féminité</span></h1>
            <p>Une sélection exclusive de portraits capturant l'essence du style et du charisme.</p>
        </section>

        <section class="gallery-grid">
            <!-- Modèle 1 -->
            <div class="card tall">
                <img src="meulfeu4.jpeg" alt="Modèle 1">
                <div class="card-overlay">
                    <div class="card-info">
                        <h3>L'Audacieuse</h3>
                        <span>Paris, 2024</span>
                    </div>
                </div>
            </div>

            <!-- Modèle 2 -->
            <div class="card">
                <img src="meulfeu2.jpeg" alt="Modèle 2">
                <div class="card-overlay">
                    <div class="card-info">
                        <h3>Sourire d'Ivoire</h3>
                        <span>Dakar, 2024</span>
                    </div>
                </div>
            </div>

            <!-- Modèle 3 -->
            <div class="card">
                <img src="meulfeu.jpeg" alt="Modèle 3">
                <div class="card-overlay">
                    <div class="card-info">
                        <h3>Éclat Ébène</h3>
                        <span>Londres, 2024</span>
                    </div>
                </div>
            </div>

            <!-- Modèle 4 -->
            <div class="card wide">
                <img src="meulfeu 3.jpeg" alt="Modèle 4">
                <div class="card-overlay">
                    <div class="card-info">
                        <h3>L'Icône</h3>
                        <span>Milan, 2023</span>
                    </div>
                </div>
            </div>
        </section>
    </main>

    <footer>
        <p>&copy; 2024 Astou Konaté — Curatrice de Beauté</p>
    </footer>

</body>
</html>
